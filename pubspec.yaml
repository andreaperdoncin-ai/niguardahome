name: niguardahome
description: "Gestione spese e contatori per le case di Niguarda (Via Passerini & Via Frugoni)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  material_design_icons_flutter: ^7.0.7296
  path_provider: ^2.1.2
  share_plus: ^8.0.0

  # Gestione dello Stato
  provider: ^6.1.2

  # Firebase Suite per Sincronizzazione e Auth
  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0

  # Grafici
  fl_chart: ^0.68.0

  # Utility
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icona.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF" # Sfondo bianco per Android
  adaptive_icon_foreground: "assets/icona.png"
